name: Release stdio binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    name: publish ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: SeqMcp.Stdio.exe
          - os: ubuntu-latest
            rid: linux-x64
            artifact: SeqMcp.Stdio
          - os: macos-latest
            rid: osx-x64
            artifact: SeqMcp.Stdio

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish single-file
        shell: bash
        run: |
          dotnet publish src/SeqMcp.Stdio/SeqMcp.Stdio.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            -p:PublishSingleFile=true \
            -p:SelfContained=true \
            -o publish/${{ matrix.rid }}

      - name: Rename artifact for release
        shell: bash
        run: |
          mv publish/${{ matrix.rid }}/${{ matrix.artifact }} \
             publish/${{ matrix.rid }}/seq-mcp-stdio-${{ matrix.rid }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seq-mcp-stdio-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/seq-mcp-stdio-${{ matrix.rid }}*

  release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/seq-mcp-stdio-*
          generate_release_notes: true
          body: |
            Single-file stdio MCP binaries for ${{ github.ref_name }}.

            ## Установка

            1. Скачайте бинарь под вашу ОС (`win-x64`, `linux-x64`, `osx-x64`).
            2. На macOS/Linux: `chmod +x seq-mcp-stdio-*`.
            3. Добавьте в конфигурацию MCP-клиента (пример для Claude Desktop):

            ```json
            {
              "mcpServers": {
                "seq": {
                  "command": "/path/to/seq-mcp-stdio-...",
                  "env": {
                    "SEQ_URL": "http://localhost:5341",
                    "SEQ_API_KEY": "..."
                  }
                }
              }
            }
            ```

            Полный README: <https://github.com/${{ github.repository }}>.
